name: Salesforce Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ✅ 1. Deploy to DEV
  deploy-dev:
    runs-on: ubuntu-22.04
    environment: TESTORG

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate DEV
        run: |
          echo "${{ secrets.SFDX_AUTH_TESTORG }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias TESTORG

      - name: Deploy to TESTORG
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --target-org TESTORG \
            --wait 30

  # ✅ 2. Deploy to UAT (after DEV)
  deploy-uat:
    needs: deploy-TESTORG
    runs-on: ubuntu-22.04
    environment: TESTORG

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate TESTORG
        run: |
          echo "${{ secrets.SFDX_AUTH_TESTORG }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias TESTORG

      - name: Deploy to TESTORG
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --target-org TESTORG \
            --wait 30

  # ✅ 3. Deploy to PROD (after UAT + approval)
  deploy-prod:
    needs: deploy-uat
    runs-on: ubuntu-22.04
    environment: prod   # ✅ Add approval in GitHub UI

    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate PROD
        run: |
          echo "${{ secrets.SFDX_AUTH_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias prodOrg

      - name: Deploy to PROD
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests \
            --target-org prodOrg \
            --wait 30
